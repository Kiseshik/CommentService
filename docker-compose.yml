version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: comments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  comment-service-memory:
    build: .
    ports:
      - "8080:8080"
    environment:
      STORAGE_DRIVER: memory
      HTTP_LISTEN_ADDR: :8080
    depends_on: []
    restart: unless-stopped

  comment-service-postgres:
    build: .
    ports:
      - "8081:8080"
    environment:
      STORAGE_DRIVER: postgres
      POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/comments?sslmode=disable
      HTTP_LISTEN_ADDR: :8080
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: